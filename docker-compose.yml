services:
  coachd:
    build: .
    image: coachd:dev
    env_file:
      # optional: `login` / `token-status` need no .env (GARMINTOKENS is set
      # below). `serve` reads TG/ANTHROPIC from .env when the loop lands.
      - path: .env
        required: false
    environment:
      # Garmin OAuth tokens live here, on a mounted volume so they survive
      # rebuilds and restarts. `login` writes them; the coach reads them.
      GARMINTOKENS: /data/garmin
    volumes:
      - ./data/garmin:/data/garmin
    restart: "no"

# One-time interactive Garmin login (allocates a TTY for password + MFA):
#   docker compose run --rm coachd login
# Check token state:
#   docker compose run --rm coachd token-status
