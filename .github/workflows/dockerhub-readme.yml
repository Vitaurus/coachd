name: Docker Hub description

# Keep the Docker Hub repository overview in sync with the repo. Docker Hub does
# not pull a README from GitHub (unlike GHCR, which reads the image's OCI label),
# so this pushes deploy/dockerhub-overview.md to the Hub repo whenever it changes.
on:
  push:
    branches: [main]
    paths:
      - deploy/dockerhub-overview.md
      - .github/workflows/dockerhub-readme.yml
  workflow_dispatch:

jobs:
  dockerhub-description:
    runs-on: ubuntu-latest
    # job-level env so the step `if` can read it; skips cleanly on a fork or
    # before the Docker Hub secrets are configured (mirrors release.yml's gate).
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@v4
      - name: Sync Docker Hub overview from the repo
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          # Must be a Docker Hub PAT with write scope (Read, Write, Delete) or the
          # account password — a read-only/narrow PAT returns 403 insufficient
          # scope on the description endpoint.
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/coachd
          readme-filepath: ./deploy/dockerhub-overview.md
          short-description: "Self-hosted AI health coach over your Garmin Connect data, in Telegram."
